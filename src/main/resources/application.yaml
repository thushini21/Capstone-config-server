spring:
  application:
    name: config-server


  cloud:
    config:
      server:
        git:
          uri: https://github.com/thushini21/Capstone-Project-Configurations.git
          search paths: platform, services
        native:
          search-locations:
            - classpath:/Configurations
            - classpath:/Configurations/platform
            - classpath:/Configurations/services

server:
  port: 9000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:9001/eureka/
    rejister-with-eureka: true
    fetch-registry: true


